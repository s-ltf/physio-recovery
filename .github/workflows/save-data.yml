name: Save Recovery Data

# Triggered remotely by the Cloudflare Worker via the GitHub "repository
# dispatch" API. Writes the posted JSON to data/history.json and commits it
# directly into THIS repo.
on:
  repository_dispatch:
    types: [save-data]

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write data file
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          mkdir -p data
          echo "$PAYLOAD" > data/history.json

      - name: Commit and push if changed
        run: |
          git config user.name "recovery-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/history.json
          git diff --staged --quiet || git commit -m "Update recovery data [skip ci]"
          git push
